name: Auto-Generate Latest Repositories

on:
  schedule:
    # Run daily at 17:00 UTC (00:00 WIB)
    - cron: "0 17 * * *"
  push:
    branches: [main]
  workflow_dispatch: null

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate repos section
        run: |
          python3 << 'PYEOF'
          import json, subprocess, sys

          # Fetch repos from GitHub API
          result = subprocess.run(
              ["curl", "-sf", "https://api.github.com/users/0xgetz/repos?sort=updated&per_page=10"],
              capture_output=True, text=True
          )
          if result.returncode != 0:
              print(f"Error fetching repos: {result.stderr}")
              sys.exit(1)

          repos = json.loads(result.stdout)

          lines = []
          lines.append("<div align=\"center\">")
          lines.append("")
          lines.append("| Repository | Description | Language | Stars | Updated |")
          lines.append("|:---|:---|:---:|:---:|:---:|")

          for repo in repos:
              # Skip forks and the profile repo itself
              if repo.get("fork", False):
                  continue
              if repo["name"] == "0xgetz":
                  continue

              name = repo["name"]
              desc = repo.get("description") or "No description"
              lang = repo.get("language") or "N/A"
              stars = repo["stargazers_count"]
              updated = repo.get("pushed_at", "")[:10]
              url = repo["html_url"]

              lines.append(f"| **[{name}]({url})** | {desc} | {lang} | {stars} | {updated} |")

          lines.append("")
          lines.append("</div>")

          content = "\n".join(lines)

          # Read current README
          with open("README.md", "r") as f:
              readme = f.read()

          # Check markers exist
          if "<!-- REPOS_START -->" not in readme:
              print("Error: REPOS_START marker not found")
              sys.exit(1)
          if "<!-- REPOS_END -->" not in readme:
              print("Error: REPOS_END marker not found")
              sys.exit(1)

          # Replace between markers
          new_readme = readme.replace(
              "<!-- REPOS_START -->\n<!-- REPOS_END -->",
              f"<!-- REPOS_START -->\n\n{content}\n\n<!-- REPOS_END -->"
          )

          # Also handle the case where content already exists
          import re
          new_readme = re.sub(
              r"<!-- REPOS_START -->.*?<!-- REPOS_END -->",
              f"<!-- REPOS_START -->\n\n{content}\n\n<!-- REPOS_END -->",
              readme,
              flags=re.DOTALL
          )

          with open("README.md", "w") as f:
              f.write(new_readme)

          print("README updated successfully")
          print(f"Generated {len([r for r in repos if not r.get('fork') and r['name'] != '0xgetz'])} repo entries")
          PYEOF

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update latest repositories section [auto-generated]"
          file_pattern: README.md
